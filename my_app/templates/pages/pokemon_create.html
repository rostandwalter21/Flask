{% extends "layouts/base.html" %}

{% block title %} Page Création pokemon {% endblock %}

{% block content %}
<a href="{{ url_for('main.pokemon_views' ) }}">Retourner a la page de liste</a>
<h1>Page de création</h1>

<form method="POST" action="{{ url_for('main.pokemon_create_views') }}">
    {% if errors %}
        <ul>
        {% for error in errors %}
            <li>{{ error }}</li>
        {% endfor %}
        </ul>
    {% endif %}
    <div>
        <label for="name">Nom</label>
        <input type="text" id="name" name="name" value="{{ form_data.get('name', '') }}">
    </div>

    <div>
        <label for="hp">HP</label>
        <input type="number" id="hp" name="hp" value="{{ form_data.get('hp', '') }}">
    </div>

    <div>
        <label for="cp">CP</label>
        <input type="number" id="cp" name="cp" value="{{ form_data.get('cp', '') }}">
    </div>

    <div>
        <label for="picture">URL de l'image</label>
        <input type="text" id="picture" name="picture" value="{{ form_data.get('picture', '') }}" placeholder="https://...">
    </div>

    <div>
        <label for="types">Types</label>
        <input type="text" id="types" name="types" value="{{ form_data.get('types', '') }}" placeholder="Feu, Vol">
    </div>

    <button type="submit">
        Ajouter
    </button>

</form>
{% endblock %}
